services:
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: super-meal-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: super-meal-backend
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    restart: unless-stopped